name: r2s openwrt build

on:
  workflow_dispatch:
    inputs:
      openwrt_ref:
        type: string
        required: true
        description: OpenWrt branch/tag, e.g. master or v25.12.4
        default: 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk aria2 gh \
              gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
              python3-setuptools rsync swig unzip zlib1g-dev file wget python3-pyelftools

      - name: Pull code
        run: |
          git clone --branch ${{ github.event.inputs.openwrt_ref }} --depth 1 https://git.openwrt.org/openwrt/openwrt.git
          cd openwrt
          git log -1 --oneline

      - name: Prepare feed for make config
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # 合并配置
          cp -a ../r2s/. ./
          sed -i "s/FRP_TOKEN/${{ secrets.FRP_TOKEN }}/g" files/etc/config/frpc
          sed -i "s/PPPOE_USERNAME/${{ secrets.PPPOE_USERNAME }}/g" files/etc/config/network
          sed -i "s/PPPOE_PASSWORD/${{ secrets.PPPOE_PASSWORD }}/g" files/etc/config/network
          make defconfig
          grep -E "CONFIG_PACKAGE_(frpc|luci-app-frpc|kmod-nf-flow|kmod-nft-offload|kmod-nft-fullcone|kmod-tcp-bbr)|CONFIG_TARGET_IMAGES_GZIP|CONFIG_IPV6|CONFIG_KERNEL_IPV6" .config || true
          grep -q "^CONFIG_PACKAGE_kmod-nft-fullcone=y" .config || echo "::warning::kmod-nft-fullcone is not available in this OpenWrt ref; FullCone NAT will not be built."

      - name: Make download with aria2
        run: |
          cd openwrt
          make -j $(($(nproc)+1)) download DLAGENTS="https https = /usr/bin/aria2c -c -x 16 -s 16 -k 1M"

      - name: Make World
        run: |
          cd openwrt
          make -j $(($(nproc)+1)) V=s
          ls -lh bin/targets/rockchip/armv8/

      - name: Authenticate gh CLI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Create release with current date tag
        run: |
          TAG=R2S
          mv ./openwrt/bin/targets/rockchip/armv8/openwrt-rockchip-armv8-friendlyarm_nanopi-r2s-squashfs-sysupgrade.img.gz ./r2s-openwrt-${{ github.event.inputs.openwrt_ref }}-squashfs-sysupgrade.img.gz
          cp ./r2s-openwrt-${{ github.event.inputs.openwrt_ref }}-squashfs-sysupgrade.img.gz ./r2s-openwrt-${{ github.event.inputs.openwrt_ref }}-squashfs-sysupgrade-$(date +%Y%m%d).img.gz
          gh release upload $TAG --clobber ./r2s-openwrt-${{ github.event.inputs.openwrt_ref }}-squashfs-sysupgrade-$(date +%Y%m%d).img.gz
          gh release upload release --clobber ./r2s-openwrt-${{ github.event.inputs.openwrt_ref }}-squashfs-sysupgrade.img.gz
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Clean up old assets in release
        run: |
          # Get all assets for the geoip tag, sorted by created_at (newest first)
          assets=$(gh api repos/{owner}/{repo}/releases/tags/${{ env.TAG }} --jq '.assets | sort_by(.created_at) | reverse')

          # Count total assets
          asset_count=$(echo "$assets" | jq length)

          # If more than 5 assets, delete the oldest ones
          if [ "$asset_count" -gt 5 ]; then
            echo "Found $asset_count assets, keeping newest 5, deleting the rest"
            echo "$assets" | jq -r '.[5:][] | .name' | while read -r asset_name; do
              echo "Deleting asset name: $asset_name"
              gh release delete-asset ${{ env.TAG }} "$asset_name" -y
            done
          else
            echo "Found $asset_count assets (5 or fewer), no assets will be deleted"
          fi
